name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    
    - name: Download main module dependencies
      run: go mod download
    
    - name: Download testdata dependencies
      run: |
        cd pkg/loglint/testdata
        go mod download
        cd ../../..
    
    - name: Run unit tests
      run: go test ./pkg/loglint/... -v
    
    - name: Build standalone
      run: go build -o loglint ./cmd/loglint

  demo-violations:
    runs-on: ubuntu-latest
    needs: test  # запускать только если тесты прошли
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: Build linter
      run: go build -o loglint ./cmd/loglint
    - name: Run on violations (should fail)
      run: |
        cd demo/violations
        ../../loglint ./...
      continue-on-error: true  # ожидаем ошибки

  demo-clean:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: Build linter
      run: go build -o loglint ./cmd/loglint
    - name: Run on clean code (should pass)
      run: |
        cd demo/clean
        ../../loglint ./...