name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # Job 1: Unit-тесты анализатора
  # ============================================
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run unit tests
      run: go test ./pkg/loglint/... -v
    
    - name: Build standalone binary
      run: go build -o loglint ./cmd/loglint

  # ============================================
  # Job 2: Демо с нарушениями (должен ПАДАТЬ)
  # ============================================
  demo-violations:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    
    - name: Setup demo project with violations
      run: |
        mkdir -p demo-violations
        cd demo-violations
        go mod init demo-violations
        go mod edit -replace github.com/tainj/loglint=../
        go get github.com/tainj/loglint
        
        cat > main.go << 'EOF'
        package main
        import "log/slog"
        func main() {
            slog.Info("Starting server")
            slog.Info("запуск сервера")
            slog.Info("server started 🚀")
        }
        EOF
        
        cat > .golangci.yml << 'EOF'
        linters-settings:
          custom:
            loglint:
              type: "module"
              path: "github.com/tainj/loglint/pkg/loglint"
        linters:
          enable:
            - loglint
        EOF
    
    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    
    - name: Run golangci-lint (should fail with violations)
      run: |
        cd demo-violations
        golangci-lint run ./...
      # ⚠️ Этот шаг должен упасть — это ожидаемое поведение!

  # ============================================
  # Job 3: Чистый код (должен ПРОХОДИТЬ)
  # ============================================
  demo-clean:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    
    - name: Setup demo project without violations
      run: |
        mkdir -p demo-clean
        cd demo-clean
        go mod init demo-clean
        go mod edit -replace github.com/tainj/loglint=../
        go get github.com/tainj/loglint
        
        cat > main.go << 'EOF'
        package main
        import "log/slog"
        func main() {
            slog.Info("starting server")
            slog.Info("server started")
            slog.Info("status=200")
        }
        EOF
        
        cat > .golangci.yml << 'EOF'
        linters-settings:
          custom:
            loglint:
              type: "module"
              path: "github.com/tainj/loglint/pkg/loglint"
        linters:
          enable:
            - loglint
        EOF
    
    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    
    - name: Run golangci-lint (should pass)
      run: |
        cd demo-clean
        golangci-lint run ./...

  # ============================================
  # Job 4: Сборка плагина (опционально)
  # ============================================
  build-plugin:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    
    - name: Build plugin (.so)
      run: |
        # Создаём plugin/main.go если нет
        mkdir -p plugin
        cat > plugin/main.go << 'EOF'
        //go:build plugin
        package main
        import (
            "github.com/tainj/loglint/pkg/loglint"
            "github.com/golangci/plugin-module-register/register"
        )
        var PluginExports = register.Export{
            Analyzers: []*register.Analyzer{
                {
                    Name: "loglint",
                    Analyzer: loglint.Analyzer,
                    Doc: "Checks log messages for style and security rules",
                },
            },
        }
        EOF
        
        go get github.com/golangci/plugin-module-register@latest
        go build -buildmode=plugin -o loglint.so ./plugin
    
    - name: Upload plugin artifact
      uses: actions/upload-artifact@v4
      with:
        name: loglint-plugin
        path: loglint.so